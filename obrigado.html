<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:
linear-gradient(
rgba(5,26,53,.90),
rgba(5,26,53,.90)
),
url('imagens/banner-home.jpg');

background-size:cover;
background-position:center;
}

.card{

background:#fff;
width:100%;
max-width:650px;
padding:60px 45px;
border-radius:35px;
text-align:center;

box-shadow:
0 20px 60px rgba(0,0,0,.35);

animation:entrada 1s ease;
}

.icone{

width:120px;
height:120px;
background:#25D366;
border-radius:50%;
margin:auto;

display:flex;
justify-content:center;
align-items:center;

font-size:60px;
color:#fff;

margin-bottom:35px;
}

h1{
font-size:42px;
color:#051A35;
margin-bottom:25px;
}

p{
font-size:20px;
line-height:1.8;
color:#555;
margin-bottom:40px;
}

.botoes{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 35px;
border-radius:50px;
text-decoration:none;
font-weight:700;
font-size:17px;
transition:.3s;
}

.btn:hover{
transform:translateY(-5px);
}

.btn-site{
background:#051A35;
color:#fff;
}

.btn-whatsapp{
background:#25D366;
color:#fff;
}

.redes{
margin-top:45px;
padding-top:30px;
border-top:1px solid #eee;
}

.redes a{
display:inline-flex;
justify-content:center;
align-items:center;

width:50px;
height:50px;

border-radius:50%;
background:#f5f5f5;

font-size:22px;
text-decoration:none;
color:#051A35;
margin:0 10px;
transition:.3s;
}

.redes a:hover{
background:#FFC107;
transform:translateY(-5px);
}

@keyframes entrada{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:600px){

.card{
padding:45px 25px;
}

h1{
font-size:32px;
}

p{
font-size:17px;
}

.btn{
width:100%;
}

}

</style>

</head>

<body>

<div class="card">

<div class="icone">
<i class="fas fa-check"></i>
</div>

<h1>
Mensagem Enviada!
</h1>

<p>
Obrigado pelo seu contato.<br><br>

Recebi sua mensagem com sucesso e retornarei o mais breve possível.

Se preferir, você também pode falar comigo diretamente pelo WhatsApp.
</p>

<div class="botoes">

<a
href="index.html"
class="btn btn-site">

<i class="fas fa-home"></i>
 Voltar ao Site

</a>

<a
href="https://wa.me/5511992916204"
target="_blank"
class="btn btn-whatsapp">

<i class="fab fa-whatsapp"></i>
 Falar no WhatsApp

</a>

</div>

<div class="redes">

<a
href="https://instagram.com/instrutorzonasulsp"
target="_blank">

<i class="fab fa-instagram"></i>

</a>

<a
href="https://www.instrutorzonasulsp.com.br">

<i class="fas fa-globe"></i>

</a>

</div>

</div>

</body>
